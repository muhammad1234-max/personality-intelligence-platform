# fly.toml app configuration file generated for personality-intelligence-platform on 2026-06-26T14:40:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'personality-intelligence-platform'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[[mounts]]
  source = 'chroma_data'
  destination = '/app/app/chroma_db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/api/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
